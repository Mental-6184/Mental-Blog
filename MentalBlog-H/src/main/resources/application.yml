server:
  port: 8080

spring:
  application:
    name: MentalBlog-H

  # 数据源配置
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mentalblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:czh041221}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson 日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.mentalblogh.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:please-change-this-to-a-32byte-secret-key!!}
  expiration: 86400000  # 24小时，单位毫秒

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  openapi:
    title: MentalBlog API 文档
    description: MentalBlog 前后端分离博客接口文档
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-value: org.example.mentalblogh.controller

# 文件上传
file:
  upload:
    path: /data/mentalblog/upload/
    max-size: 10485760  # 10MB
